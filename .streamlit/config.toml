[theme]
base = "dark"
# Neonowy, nowoczesny błękit dla przycisków i akcentów
primaryColor = "#3B82F6"
# Głęboka czerń (jak w nowoczesnych aplikacjach AI na telefon)
backgroundColor = "#0B0F19"
# Ciemny grafit dla wyskakujących okienek i paska bocznego
secondaryBackgroundColor = "#111827"
# Czysta biel dla tekstu
textColor = "#F9FAFB"
font = "sans serif"